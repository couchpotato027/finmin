services:
  - type: web
    name: finmin-api
    runtime: python
    rootDirectory: backend
    buildCommand: "python -m pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:10000"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DATABASE_URL
        value: "postgresql://postgres:[YOUR-PASSWORD]@db.cntldsboatukfeqlfrjk.supabase.co:5432/postgres"
