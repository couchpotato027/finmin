services:
  - type: web
    name: finmin-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        value: postgresql://postgres:[YOUR-PASSWORD]@db.cntldsboatukfeqlfrjk.supabase.co:5432/postgres
